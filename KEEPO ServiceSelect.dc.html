<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<style>
  @keyframes kSelIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
</style>
</helmet>
<div ref="{{ setRootRef }}" onKeyDown="{{ onKeyDown }}" style="position:relative;font-family:'Mulish',sans-serif">
  <div tabIndex="0" onClick="{{ toggleOpen }}" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:10px;border:{{ triggerBorder }};background:{{ triggerBg }};cursor:pointer;user-select:none">
    <span style="font-size:16px;flex:none;line-height:1">{{ selectedIcon }}</span>
    <span style="flex:1;font-size:14.5px;color:{{ triggerColor }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ displayText }}</span>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="{{ triggerColor }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;transition:transform .2s ease;transform:{{ chevronRotate }}"><path d="M6 9l6 6 6-6"></path></svg>
  </div>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:200;background:oklch(1 0 0);border:1px solid oklch(0.91 0.006 90);border-radius:20px;box-shadow:0 30px 60px -20px oklch(0.15 0.02 250 / 0.35);padding:10px;animation:kSelIn .18s cubic-bezier(.2,.8,.3,1)">
      <sc-for list="{{ items }}" as="opt" hint-placeholder-count="6">
        <div onClick="{{ opt.onClick }}" onMouseEnter="{{ opt.onHover }}" style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .18s ease;background:{{ opt.bg }}">
          <span style="font-size:16px;flex:none;line-height:1">{{ opt.icon }}</span>
          <span style="flex:1;font-size:14.5px;color:oklch(0.22 0.02 250);font-weight:{{ opt.fontWeight }}">{{ opt.text }}</span>
          <sc-if value="{{ opt.selected }}" hint-placeholder-val="{{ false }}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="{{ accentColor }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M20 6L9 17l-5-5"></path></svg>
          </sc-if>
        </div>
      </sc-for>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:52},&quot;value&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;changeHandler&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(value: string) =&gt; void&quot;},&quot;uiLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;pl&quot;,&quot;options&quot;:[&quot;pl&quot;,&quot;ua&quot;,&quot;en&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;oklch(0.72 0.15 155)&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Select a service&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { open: false, highlight: -1 };

  componentDidMount() {
    this._onDocMouseDown = (e) => {
      if (this.state.open && this.rootEl && !this.rootEl.contains(e.target)) this.setState({ open: false });
    };
    document.addEventListener('mousedown', this._onDocMouseDown);
  }
  componentWillUnmount() {
    document.removeEventListener('mousedown', this._onDocMouseDown);
  }

  setRootRef = (el) => { this.rootEl = el; };

  getOptions() {
    const KB = window.KEEPO_BOOKING_SHARED;
    const lang = this.props.uiLang || 'pl';
    return KB ? KB.getServiceOptions(lang) : [];
  }

  splitLabel(label) {
    const idx = label.indexOf(' ');
    return idx === -1 ? ['', label] : [label.slice(0, idx), label.slice(idx + 1)];
  }

  toggleOpen = (e) => {
    if (e) e.stopPropagation();
    this.setState(s => {
      if (s.open) return { open: false };
      const opts = this.getOptions();
      const idx = opts.findIndex(o => o.value === this.props.value);
      return { open: true, highlight: idx >= 0 ? idx : 0 };
    });
  };

  selectIndex = (idx) => {
    const opts = this.getOptions();
    const opt = opts[idx];
    if (!opt) return;
    this.setState({ open: false });
    if (this.props.changeHandler) this.props.changeHandler(opt.value);
  };

  onKeyDown = (e) => {
    const opts = this.getOptions();
    if (e.key === 'Escape') { this.setState({ open: false }); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      this.setState(s => s.open ? { highlight: Math.min((s.highlight < 0 ? -1 : s.highlight) + 1, opts.length - 1) } : { open: true, highlight: 0 });
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      this.setState(s => s.open ? { highlight: Math.max(s.highlight - 1, 0) } : { open: true, highlight: opts.length - 1 });
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      if (this.state.open && this.state.highlight >= 0) this.selectIndex(this.state.highlight);
      else this.setState({ open: true });
    }
  };

  renderVals() {
    const accent = this.props.accentColor || 'oklch(0.72 0.15 155)';
    const dark = (this.props.variant || 'light') === 'dark';
    const options = this.getOptions();
    const selected = options.find(o => o.value === this.props.value);
    const [selIcon, selText] = selected ? this.splitLabel(selected.label) : ['🗂️', ''];

    const triggerBg = dark ? 'oklch(1 0 0 / 0.05)' : 'oklch(0.99 0.004 90)';
    const triggerBorder = dark ? '1px solid oklch(1 0 0 / 0.14)' : '1px solid oklch(0.88 0.006 90)';
    const mutedColor = dark ? 'oklch(0.55 0.02 250)' : 'oklch(0.55 0.02 250)';
    const triggerColor = selected ? (dark ? 'oklch(0.96 0.004 90)' : 'oklch(0.18 0.02 250)') : mutedColor;

    return {
      open: this.state.open,
      setRootRef: this.setRootRef,
      toggleOpen: this.toggleOpen,
      onKeyDown: this.onKeyDown,
      accentColor: accent,
      triggerBg,
      triggerBorder,
      triggerColor,
      selectedIcon: selected ? selIcon : '🗂️',
      displayText: selected ? selText : (this.props.placeholder || ''),
      chevronRotate: this.state.open ? 'rotate(180deg)' : 'rotate(0deg)',
      items: options.map((o, i) => {
        const [icon, text] = this.splitLabel(o.label);
        const isSelected = o.value === this.props.value;
        const isHighlighted = i === this.state.highlight;
        return {
          icon,
          text,
          selected: isSelected,
          fontWeight: isSelected ? 700 : 500,
          bg: isHighlighted ? '#F2FCF5' : 'transparent',
          onClick: (e) => { e.stopPropagation(); this.selectIndex(i); },
          onHover: () => this.setState({ highlight: i })
        };
      })
    };
  }
}

</script>
</body>
</html>
