<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<style>
  @keyframes kDpIn{from{opacity:0;transform:translateY(-6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .keepo-dp-day:not(:disabled):not(.dp-selected):hover{background:var(--dp-hover) !important}
  .keepo-dp-navbtn:hover{filter:brightness(0.94)}
</style>
</helmet>
<div ref="{{ setRootRef }}" style="position:relative;font-family:'Mulish',sans-serif">
  <div onClick="{{ toggleOpen }}" style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;border-radius:10px;border:{{ triggerBorder }};background:{{ triggerBg }};cursor:pointer;user-select:none">
    <span style="font-size:14.5px;color:{{ triggerColor }}">{{ displayText }}</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="{{ triggerColor }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:none">
      <rect x="3" y="5" width="18" height="16" rx="3"></rect><path d="M3 10h18"></path><path d="M8 3v4"></path><path d="M16 3v4"></path>
    </svg>
  </div>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:calc(100% + 10px);left:0;z-index:200;width:300px;max-width:calc(100vw - 48px);background:{{ popBg }};border:{{ popBorder }};border-radius:20px;box-shadow:0 30px 60px -20px oklch(0.15 0.02 250 / 0.35);padding:22px;animation:kDpIn .18s cubic-bezier(.2,.8,.3,1);--dp-hover:{{ hoverBg }}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button type="button" onClick="{{ prevMonth }}" aria-label="Previous month" class="keepo-dp-navbtn" style="width:30px;height:30px;border-radius:100px;border:none;background:{{ navBtnBg }};color:{{ navBtnColor }};cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
        </button>
        <span style="font-family:'Manrope',sans-serif;font-weight:700;font-size:14.5px;color:{{ popTextColor }};text-transform:capitalize">{{ monthLabel }}</span>
        <button type="button" onClick="{{ nextMonth }}" aria-label="Next month" class="keepo-dp-navbtn" style="width:30px;height:30px;border-radius:100px;border:none;background:{{ navBtnBg }};color:{{ navBtnColor }};cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"></path></svg>
        </button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
        <sc-for list="{{ weekdayLabels }}" as="wd" hint-placeholder-count="7">
          <span style="text-align:center;font-size:11px;font-weight:700;letter-spacing:0.3px;color:{{ weekdayColor }};text-transform:uppercase">{{ wd }}</span>
        </sc-for>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        <sc-for list="{{ days }}" as="d" hint-placeholder-count="35">
          <button type="button" onClick="{{ d.onClick }}" disabled="{{ d.disabled }}" class="{{ d.className }}" style="{{ d.style }}">{{ d.label }}</button>
        </sc-for>
      </div>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:52},&quot;value&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;changeHandler&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(iso: string) =&gt; void&quot;},&quot;uiLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;pl&quot;,&quot;options&quot;:[&quot;pl&quot;,&quot;ua&quot;,&quot;en&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;oklch(0.72 0.15 155)&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Select a date&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    const initial = props.value ? new Date(props.value + 'T00:00:00') : new Date();
    this.state = { open: false, viewYear: initial.getFullYear(), viewMonth: initial.getMonth() };
  }

  componentDidMount() {
    this._onDocMouseDown = (e) => {
      if (this.state.open && this.rootEl && !this.rootEl.contains(e.target)) this.setState({ open: false });
    };
    document.addEventListener('mousedown', this._onDocMouseDown);
  }

  componentWillUnmount() {
    document.removeEventListener('mousedown', this._onDocMouseDown);
  }

  setRootRef = (el) => { this.rootEl = el; };

  toggleOpen = () => this.setState(s => ({ open: !s.open }));

  prevMonth = (e) => {
    if (e) e.stopPropagation();
    this.setState(s => { let m = s.viewMonth - 1, y = s.viewYear; if (m < 0) { m = 11; y -= 1; } return { viewMonth: m, viewYear: y }; });
  };
  nextMonth = (e) => {
    if (e) e.stopPropagation();
    this.setState(s => { let m = s.viewMonth + 1, y = s.viewYear; if (m > 11) { m = 0; y += 1; } return { viewMonth: m, viewYear: y }; });
  };

  selectDay = (iso) => (e) => {
    if (e) e.stopPropagation();
    this.setState({ open: false });
    if (this.props.changeHandler) this.props.changeHandler(iso);
  };

  pad = (n) => String(n).padStart(2, '0');

  renderVals() {
    const MONTHS = {
      pl: ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'],
      ua: ['Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень', 'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'],
      en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December']
    };
    const WEEKDAYS = {
      pl: ['Pn', 'Wt', 'Śr', 'Cz', 'Pt', 'So', 'Nd'],
      ua: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'],
      en: ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su']
    };
    const lang = this.props.uiLang || 'pl';
    const accent = this.props.accentColor || 'oklch(0.72 0.15 155)';
    const dark = (this.props.variant || 'light') === 'dark';
    const { viewYear, viewMonth, open } = this.state;

    const now = new Date();
    const todayIso = now.getFullYear() + '-' + this.pad(now.getMonth() + 1) + '-' + this.pad(now.getDate());
    const selectedIso = this.props.value || '';

    const firstOfMonth = new Date(viewYear, viewMonth, 1);
    let startOffset = firstOfMonth.getDay() - 1;
    if (startOffset < 0) startOffset = 6;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    const days = [];
    for (let i = 0; i < startOffset; i++) {
      days.push({ label: '', disabled: true, onClick: undefined, className: 'keepo-dp-day', style: 'visibility:hidden;width:34px;height:34px' });
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = viewYear + '-' + this.pad(viewMonth + 1) + '-' + this.pad(d);
      const isPast = iso < todayIso;
      const isToday = iso === todayIso;
      const isSelected = iso === selectedIso;
      let bg = 'transparent', color = dark ? 'oklch(0.88 0.004 90)' : 'oklch(0.22 0.02 250)', fontWeight = 500, border = 'none';
      if (isSelected) { bg = accent; color = 'oklch(0.16 0.02 250)'; fontWeight = 700; }
      else if (isToday) { border = '1.5px solid ' + accent; color = accent; fontWeight = 700; }
      if (isPast && !isSelected) color = dark ? 'oklch(0.38 0.02 250)' : 'oklch(0.8 0.006 90)';
      days.push({
        label: String(d),
        disabled: isPast,
        onClick: isPast ? undefined : this.selectDay(iso),
        className: isSelected ? 'keepo-dp-day dp-selected' : 'keepo-dp-day',
        style: `width:34px;height:34px;border-radius:100px;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:${fontWeight};background:${bg};color:${color};border:${border};cursor:${isPast ? 'default' : 'pointer'};transition:background .15s ease,color .15s ease;margin:0 auto`
      });
    }

    const displayText = selectedIso
      ? (() => { const p = selectedIso.split('-'); return p[2] + '.' + p[1] + '.' + p[0]; })()
      : (this.props.placeholder || '');

    const triggerBg = dark ? 'oklch(1 0 0 / 0.05)' : 'oklch(0.99 0.004 90)';
    const triggerBorder = dark ? '1px solid oklch(1 0 0 / 0.14)' : '1px solid oklch(0.88 0.006 90)';
    const mutedColor = dark ? 'oklch(0.55 0.02 250)' : 'oklch(0.55 0.02 250)';
    const triggerColor = selectedIso ? (dark ? 'oklch(0.96 0.004 90)' : 'oklch(0.18 0.02 250)') : mutedColor;

    return {
      open,
      setRootRef: this.setRootRef,
      toggleOpen: this.toggleOpen,
      prevMonth: this.prevMonth,
      nextMonth: this.nextMonth,
      monthLabel: MONTHS[lang][viewMonth] + ' ' + viewYear,
      weekdayLabels: WEEKDAYS[lang],
      days,
      displayText,
      triggerBg,
      triggerBorder,
      triggerColor,
      popBg: dark ? 'oklch(0.15 0.018 250)' : 'oklch(1 0 0)',
      popBorder: dark ? '1px solid oklch(1 0 0 / 0.1)' : '1px solid oklch(0.91 0.006 90)',
      popTextColor: dark ? 'oklch(0.94 0.004 90)' : 'oklch(0.2 0.02 250)',
      weekdayColor: mutedColor,
      navBtnColor: dark ? 'oklch(0.85 0.004 90)' : 'oklch(0.4 0.02 250)',
      navBtnBg: dark ? 'oklch(1 0 0 / 0.07)' : 'oklch(0.96 0.006 90)',
      hoverBg: `color-mix(in oklch, ${accent} 14%, transparent)`
    };
  }
}

</script>
</body>
</html>
